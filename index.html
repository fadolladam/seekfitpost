<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Filter & Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="16" x2="22" y1="11" y2="11"/></svg>
                    Contact Directory
                </h1>
                <p class="text-slate-500 mt-1" id="contact-count-summary">Manage and filter through 1 professional contacts</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="toggleModal(true)" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-50 transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    Bulk Import
                </button>
                <button onclick="exportCSV()" class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    Export CSV
                </button>
            </div>
        </div>

        <!-- Search and Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input 
                    type="text" 
                    id="search-input"
                    placeholder="Search by name, email, position or phone..." 
                    class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    oninput="renderContacts()"
                >
            </div>
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                <select 
                    id="position-filter"
                    class="border border-slate-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onchange="renderContacts()"
                >
                    <option value="All">All Positions</option>
                </select>
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="p-4 font-semibold text-slate-600 text-sm">Full Name</th>
                            <th class="p-4 font-semibold text-slate-600 text-sm">Position</th>
                            <th class="p-4 font-semibold text-slate-600 text-sm">Email</th>
                            <th class="p-4 font-semibold text-slate-600 text-sm">Phone</th>
                            <th class="p-4 font-semibold text-slate-600 text-sm text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="contacts-table-body">
                        <!-- Contacts will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-4 flex justify-between items-center text-sm text-slate-500">
            <p id="showing-count">Showing 0 of 0 contacts</p>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl scale-95 transition-all duration-200">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Bulk Import Contacts</h2>
                <button onclick="toggleModal(false)" class="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="p-6">
                <p class="text-sm text-slate-500 mb-4">
                    Paste your contact list here. Each line should be separated by a Pipe (|) or Tab. 
                    <br>
                    Format: <code class="bg-slate-100 px-1 rounded">Name|Last Name|Email|Position|Phone</code>
                </p>
                <textarea 
                    id="import-textarea"
                    class="w-full h-64 p-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                    placeholder="Chhuon|Sophat|sophat.chhuon@gmail.com|Card Operations|086223706"
                ></textarea>
            </div>
            <div class="p-6 border-t border-slate-100 flex justify-end gap-3">
                <button onclick="toggleModal(false)" class="px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">Cancel</button>
                <button onclick="handleBulkImport()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">Process List</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let contacts = [
            { id: 1, firstName: 'Chhuon', lastName: 'Sophat', email: 'sophat.chhuon@gmail.com', position: 'Card Operations Support Officer', phone: '086223706' }
        ];

        // UI Selectors
        const tableBody = document.getElementById('contacts-table-body');
        const searchInput = document.getElementById('search-input');
        const positionFilter = document.getElementById('position-filter');
        const modal = document.getElementById('import-modal');
        const importTextarea = document.getElementById('import-textarea');
        const summaryText = document.getElementById('contact-count-summary');
        const showingCountText = document.getElementById('showing-count');

        // Functions
        function toggleModal(show) {
            if (show) {
                modal.classList.add('modal-active');
            } else {
                modal.classList.remove('modal-active');
                importTextarea.value = '';
            }
        }

        function handleBulkImport() {
            const text = importTextarea.value.trim();
            if (!text) return;

            const lines = text.split('\n');
            const newContacts = lines.map((line, index) => {
                const parts = line.split(/[|\t]/).map(p => p.trim());
                if (parts.length < 2) return null;
                return {
                    id: Date.now() + index,
                    firstName: parts[0] || '',
                    lastName: parts[1] || '',
                    email: parts[2] || '',
                    position: parts[3] || '',
                    phone: parts[4] || ''
                };
            }).filter(Boolean);

            contacts = [...contacts, ...newContacts];
            updateFilterOptions();
            renderContacts();
            toggleModal(false);
        }

        function deleteContact(id) {
            contacts = contacts.filter(c => c.id !== id);
            updateFilterOptions();
            renderContacts();
        }

        function updateFilterOptions() {
            const uniquePositions = [...new Set(contacts.map(c => c.position).filter(Boolean))];
            const currentSelection = positionFilter.value;
            
            positionFilter.innerHTML = '<option value="All">All Positions</option>';
            uniquePositions.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                option.textContent = pos;
                positionFilter.appendChild(option);
            });
            positionFilter.value = currentSelection;
        }

        function exportCSV() {
            const headers = "First Name,Last Name,Email,Position,Phone\n";
            const csv = contacts.map(c => `${c.firstName},${c.lastName},${c.email},${c.position},${c.phone}`).join('\n');
            const blob = new Blob([headers + csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'contacts_export.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function renderContacts() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterValue = positionFilter.value;

            const filtered = contacts.filter(c => {
                const searchStr = `${c.firstName} ${c.lastName} ${c.email} ${c.position} ${c.phone}`.toLowerCase();
                const matchesSearch = searchStr.includes(searchTerm);
                const matchesPosition = filterValue === 'All' || c.position === filterValue;
                return matchesSearch && matchesPosition;
            });

            summaryText.textContent = `Manage and filter through ${contacts.length} professional contacts`;
            showingCountText.textContent = `Showing ${filtered.length} of ${contacts.length} contacts`;

            if (filtered.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-12 text-center text-slate-400">
                            <div class="flex flex-col items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-4 text-slate-200"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                                <p>No contacts found matching your criteria.</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = filtered.map(c => `
                <tr class="border-t border-slate-100 hover:bg-slate-50 transition-colors group">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-xs">
                                ${c.firstName[0] || ''}${c.lastName[0] || ''}
                            </div>
                            <span class="font-medium">${c.firstName} ${c.lastName}</span>
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2 text-slate-600 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                            ${c.position || 'N/A'}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2 text-slate-600 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            ${c.email}
                        </div>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2 text-slate-600 text-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            ${c.phone}
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <button 
                            onclick="deleteContact(${c.id})"
                            class="text-slate-300 hover:text-red-500 p-2 transition-colors"
                            title="Delete"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Initialize
        updateFilterOptions();
        renderContacts();
    </script>
</body>
</html>
